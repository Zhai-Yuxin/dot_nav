pointcloud_to_laserscan:
  ros__parameters:
    target_frame: lidar
    transform_tolerance: 0.01

    min_height: 0.1
    max_height: 0.4

    angle_min: -3.14
    angle_max: 3.14
    angle_increment: 0.0087  # ~720 points

    scan_time: 0.05
    range_min: 0.2
    range_max: 20.0

    use_inf: true
